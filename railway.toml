[build]
builder = "nixpacks"

[build.env]
NPM_CONFIG_PRODUCTION = "false"

[deploy]
startCommand = "cd backend && cp -n prisma/seed.db prisma/dev.db || true && npx prisma migrate deploy && node index.js"
healthcheckPath = "/api/ping"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
